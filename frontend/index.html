<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireFlow AI — Resume Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & tokens ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --surface2:  #1c2030;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --accent:    #5b8fff;
      --accent2:   #8b5cf6;
      --success:   #34d399;
      --warn:      #fbbf24;
      --danger:    #f87171;
      --radius:    12px;
      --radius-lg: 20px;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans:  'DM Sans', system-ui, sans-serif;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Noise grain overlay ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .5;
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .logo-word {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo-word span { color: var(--accent); }

    .logo-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(91,143,255,0.12);
      border: 1px solid rgba(91,143,255,0.25);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .4s;
    }
    .status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.err { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }

    .status-label { font-size: .8rem; color: var(--muted); }

    /* ── Main grid ───────────────────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 640px) {
      .main-grid { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .card-label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Textarea ────────────────────────────────────────────────── */
    textarea {
      width: 100%;
      height: 160px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: .9rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── Drop zone ───────────────────────────────────────────────── */
    .drop-zone {
      position: relative;
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(91,143,255,0.05);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-icon {
      width: 36px; height: 36px;
      margin: 0 auto 10px;
      border-radius: 10px;
      background: rgba(91,143,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    .drop-title {
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
    }

    .drop-sub {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .drop-filename {
      margin-top: 10px;
      font-size: .8rem;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Button ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--font-sans);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
      letter-spacing: .01em;
      user-select: none;
    }

    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      margin-top: 16px;
    }

    .btn-primary:not(:disabled):hover { opacity: .88; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border2);
      font-size: .78rem;
      padding: 6px 12px;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--border2); }

    /* ── Spinner ─────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    /* ── Results panel ───────────────────────────────────────────── */
    .results-panel {
      grid-column: 1 / -1;
      display: none;
    }

    .results-panel.visible { display: block; }

    /* ── Score ring ──────────────────────────────────────────────── */
    .results-top {
      display: flex;
      align-items: flex-start;
      gap: 28px;
      margin-bottom: 24px;
    }

    @media (max-width: 500px) {
      .results-top { flex-direction: column; align-items: center; }
    }

    .ring-wrap {
      flex-shrink: 0;
      position: relative;
      width: 100px; height: 100px;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 7;
    }

    .ring-fill {
      fill: none;
      stroke-width: 7;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1),
                  stroke .5s;
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.1;
    }

    .ring-number {
      font-family: var(--font-serif);
      font-size: 1.65rem;
      color: var(--text);
    }

    .ring-sub {
      font-size: .62rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .results-meta { flex: 1; }

    .results-file {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .results-file strong { color: var(--text); font-weight: 500; }

    /* ── Section blocks ──────────────────────────────────────────── */
    .section-block {
      margin-top: 20px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .pill-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: .88rem;
      line-height: 1.55;
      color: var(--text);
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 10px 14px;
      border: 1px solid var(--border);
    }

    .item-num {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border-radius: 6px;
      font-size: .7rem;
      font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }

    /* ── Summary box ─────────────────────────────────────────────── */
    .summary-box {
      font-size: .88rem;
      line-height: 1.65;
      color: #c8ccd8;
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 16px;
      margin-top: 4px;
      font-style: italic;
    }

    /* ── Raw toggle ──────────────────────────────────────────────── */
    .raw-section { margin-top: 20px; }

    .raw-toggle {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: .78rem;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .raw-toggle:hover { color: var(--text); }

    .raw-chevron {
      display: inline-block;
      transition: transform .2s;
      font-size: .65rem;
    }

    .raw-chevron.open { transform: rotate(90deg); }

    .raw-pre {
      display: none;
      margin-top: 10px;
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      font-size: .78rem;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      color: #8b9cb8;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }

    .raw-pre.open { display: block; }

    /* ── Error banner ────────────────────────────────────────────── */
    .error-banner {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: rgba(248, 113, 113, .08);
      border: 1px solid rgba(248, 113, 113, .25);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: .85rem;
      color: #fca5a5;
      margin-top: 12px;
      grid-column: 1 / -1;
    }

    .error-banner.visible { display: flex; }

    /* ── History ─────────────────────────────────────────────────── */
    .history-section {
      grid-column: 1 / -1;
      margin-top: 8px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      cursor: pointer;
      transition: border-color .18s;
    }

    .history-item:hover { border-color: var(--accent); }

    .history-score {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif);
      font-size: .95rem;
    }

    .history-info { flex: 1; min-width: 0; }

    .history-name {
      font-size: .85rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-date {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .history-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      line-height: 1;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }

    .history-del:hover { color: var(--danger); background: rgba(248,113,113,.1); }

    .history-empty {
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      padding: 24px 0;
    }

    /* ── Fade in animation ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeUp .4s ease both; }
  </style>
</head>

<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-word">Hire<span>Flow</span></span>
      <span class="logo-badge">AI</span>
    </div>
    <div class="header-right">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Checking…</span>
    </div>
  </header>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- Job description card -->
    <div class="card">
      <div class="card-label">Job Description</div>
      <textarea id="jobDesc" placeholder="Paste the full job description here…"></textarea>
    </div>

    <!-- Resume upload card -->
    <div class="card">
      <div class="card-label">Resume (PDF)</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="resumeFile" accept=".pdf" />
        <div class="drop-icon">📄</div>
        <div class="drop-title">Drop your PDF here</div>
        <div class="drop-sub">or click to browse</div>
        <div class="drop-filename" id="dropFilename"></div>
      </div>
      <button class="btn btn-primary" id="analyzeBtn" disabled>
        Analyze Resume
      </button>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="errorBanner">
      <span>⚠</span>
      <span id="errorMsg"></span>
    </div>

    <!-- Results panel -->
    <div class="results-panel card fade-in" id="resultsPanel">

      <div class="results-top">
        <!-- Score ring -->
        <div class="ring-wrap">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="42"/>
            <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="42"
              stroke-dasharray="263.9"
              stroke-dashoffset="263.9"
              stroke="var(--accent)"/>
          </svg>
          <div class="ring-label">
            <span class="ring-number" id="ringNumber">—</span>
            <span class="ring-sub">match</span>
          </div>
        </div>

        <!-- Meta -->
        <div class="results-meta">
          <div class="results-file">File: <strong id="metaFile">—</strong></div>

          <!-- Summary -->
          <div class="section-block">
            <div class="section-heading">
              <span class="pill-dot" style="background:var(--accent)"></span>
              Summary
            </div>
            <div class="summary-box" id="summaryText">—</div>
          </div>
        </div>
      </div>

      <!-- Strengths -->
      <div class="section-block" id="strengthsBlock">
        <div class="section-heading">
          <span class="pill-dot" style="background:var(--success)"></span>
          Strengths
        </div>
        <div class="items-list" id="strengthsList"></div>
      </div>

      <!-- Gaps -->
      <div class="section-block" id="gapsBlock">
        <div class="section-heading">
          <span class="pill-dot" style="background:var(--danger)"></span>
          Gaps
        </div>
        <div class="items-list" id="gapsList"></div>
      </div>

      <!-- Recommendations -->
      <div class="section-block" id="recsBlock">
        <div class="section-heading">
          <span class="pill-dot" style="background:var(--warn)"></span>
          Recommendations
        </div>
        <div class="items-list" id="recsList"></div>
      </div>

      <!-- Raw toggle -->
      <div class="raw-section">
        <button class="raw-toggle" id="rawToggle">
          <span class="raw-chevron" id="rawChevron">▶</span>
          View raw AI response
        </button>
        <pre class="raw-pre" id="rawPre"></pre>
      </div>

    </div>

    <!-- History -->
    <div class="history-section">
      <div class="history-header">
        <span class="history-title">Past Analyses</span>
        <button class="btn btn-ghost" id="refreshHistory">↻ Refresh</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No analyses yet.</div>
      </div>
    </div>

  </div><!-- /main-grid -->
</div><!-- /shell -->

<script> 
const API = 'http://localhost:8000';

/* ── Utility ─────────────────────────────────────────────────────── */
const $  = id => document.getElementById(id);
const jd = () => $('jobDesc').value.trim();

function scoreColor(s) {
  if (s === null || s === undefined) return 'var(--muted)';
  if (s >= 75) return 'var(--success)';
  if (s >= 50) return 'var(--warn)';
  return 'var(--danger)';
}

function fmt(iso) {
  return new Date(iso).toLocaleString(undefined, {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

/* ── Health check ────────────────────────────────────────────────── */
async function checkHealth() {
  try {
    const r = await fetch(`${API}/`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    $('statusDot').className   = 'status-dot ok';
    $('statusLabel').textContent = `Online · ${d.model}`;
  } catch {
    $('statusDot').className   = 'status-dot err';
    $('statusLabel').textContent = 'Backend offline';
  }
}

/* ── File drop zone ──────────────────────────────────────────────── */
const dropZone   = $('dropZone');
const resumeFile = $('resumeFile');
let selectedFile = null;

function onFileSelected(file) {
  if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
    showError('Please select a PDF file.'); return;
  }
  selectedFile = file;
  $('dropFilename').textContent = file.name;
  updateAnalyzeBtn();
  hideError();
}

resumeFile.addEventListener('change', () => onFileSelected(resumeFile.files[0]));

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  onFileSelected(e.dataTransfer.files[0]);
});

$('jobDesc').addEventListener('input', updateAnalyzeBtn);

function updateAnalyzeBtn() {
  $('analyzeBtn').disabled = !(selectedFile && jd().length >= 20);
}

/* ── Error helpers ───────────────────────────────────────────────── */
function showError(msg) {
  $('errorMsg').textContent = msg;
  $('errorBanner').classList.add('visible');
}
function hideError() {
  $('errorBanner').classList.remove('visible');
}

/* ── Analyze ─────────────────────────────────────────────────────── */
$('analyzeBtn').addEventListener('click', async () => {
  if (!selectedFile || jd().length < 20) return;

  const btn = $('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing…';
  hideError();
  $('resultsPanel').classList.remove('visible');

  const fd = new FormData();
  fd.append('job_description', jd());
  fd.append('resume', selectedFile);

  try {
    const resp = await fetch(`${API}/analyze`, { method: 'POST', body: fd });
    const data = await resp.json();

    if (!resp.ok) {
      showError(data.detail || `Server error ${resp.status}`);
      return;
    }

    renderResults(data);
    loadHistory();
  } catch (err) {
    showError('Could not reach the backend. Is it running on port 8000?');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze Resume';
    updateAnalyzeBtn();
  }
});

/* ── Parse structured AI response ───────────────────────────────── */
function parseSection(raw, heading) {
  const re = new RegExp(heading + '[:\\s]*\\n([\\s\\S]*?)(?=\\n[A-Z_]{3,}[:\\s]|$)', 'i');
  const m  = raw.match(re);
  if (!m) return [];
  return m[1]
    .split('\n')
    .map(l => l.replace(/^\s*\d+\.\s*/, '').trim())
    .filter(l => l.length > 2);
}

function parseSummary(raw) {
  const m = raw.match(/SUMMARY[:\s]*\n([\s\S]*?)(?=\n[A-Z_]{3,}[:\s]|$)/i);
  return m ? m[1].trim() : '';
}

/* ── Render results ──────────────────────────────────────────────── */
function renderResults(data) {
  const panel = $('resultsPanel');
  const raw   = data.raw_analysis || '';
  const score = data.score;

  /* score ring */
  const circ  = 263.9;
  const pct   = (score !== null && score !== undefined) ? score : 0;
  const color = scoreColor(score);

  const ring = $('ringFill');
  ring.style.stroke = color;
  ring.style.strokeDashoffset = circ - (circ * pct / 100);

  $('ringNumber').textContent = score !== null && score !== undefined ? `${score}%` : '?';
  $('ringNumber').style.color = color;

  /* meta */
  $('metaFile').textContent = data.filename || '—';

  /* summary */
  const sum = parseSummary(raw);
  $('summaryText').textContent = sum || 'See raw response below.';

  /* sections */
  renderList('strengthsList', parseSection(raw, 'STRENGTHS'),       'var(--success)', 0x2713);
  renderList('gapsList',      parseSection(raw, 'GAPS'),            'var(--danger)',  0x00d7);
  renderList('recsList',      parseSection(raw, 'RECOMMENDATIONS'), 'var(--warn)',    0x2192);

  /* raw */
  $('rawPre').textContent = raw;

  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderList(listId, items, color, icon) {
  const el = $(listId);
  el.innerHTML = '';
  if (!items.length) {
    el.innerHTML = `<div class="history-empty" style="padding:8px 0">No items found.</div>`;
    return;
  }
  items.forEach((text, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <span class="item-num" style="background:${color}20;color:${color}">${i + 1}</span>
      <span>${text}</span>
    `;
    el.appendChild(row);
  });
}

/* ── Raw toggle ──────────────────────────────────────────────────── */
$('rawToggle').addEventListener('click', () => {
  const pre     = $('rawPre');
  const chevron = $('rawChevron');
  const open    = pre.classList.toggle('open');
  chevron.classList.toggle('open', open);
});

/* ── History ─────────────────────────────────────────────────────── */
async function loadHistory() {
  try {
    const r = await fetch(`${API}/history?limit=10`);
    if (!r.ok) return;
    const items = await r.json();
    renderHistory(items);
  } catch { /* backend may be offline */ }
}

function renderHistory(items) {
  const list = $('historyList');
  if (!items.length) {
    list.innerHTML = '<div class="history-empty">No analyses yet.</div>';
    return;
  }
  list.innerHTML = '';
  items.forEach(item => {
    const color = scoreColor(item.score);
    const el    = document.createElement('div');
    el.className = 'history-item';
    el.innerHTML = `
      <div class="history-score" style="background:${color}18;color:${color}">
        ${item.score !== null ? item.score + '%' : '—'}
      </div>
      <div class="history-info">
        <div class="history-name">${item.filename}</div>
        <div class="history-date">${fmt(item.created_at)}</div>
      </div>
      <button class="history-del" data-id="${item.id}" title="Delete">✕</button>
    `;
    el.querySelector('.history-del').addEventListener('click', async e => {
      e.stopPropagation();
      await deleteResult(item.id);
    });
    el.addEventListener('click', async () => {
      await viewResult(item.id);
    });
    list.appendChild(el);
  });
}

async function deleteResult(id) {
  try {
    await fetch(`${API}/history/${id}`, { method: 'DELETE' });
    loadHistory();
  } catch { showError('Could not delete result.'); }
}

async function viewResult(id) {
  try {
    const r    = await fetch(`${API}/history/${id}`);
    const data = await r.json();
    if (r.ok) renderResults(data);
  } catch { showError('Could not load result.'); }
}

$('refreshHistory').addEventListener('click', loadHistory);

/* ── Init ────────────────────────────────────────────────────────── */
checkHealth();
loadHistory();
</script>
